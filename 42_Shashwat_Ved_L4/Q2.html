<!DOCTYPE html>
<html>
<head>
<title>Calculator</title>
<script src="jquery-4.0.0.min.js"></script>

<script>
$(document).ready(function(){
    $(".btn").click(function(){
        var a = parseFloat($("#num1").val());
        var b = parseFloat($("#num2").val());
        var op = $(this).val();
        var result;

        if(op == "+") result = a + b;
        if(op == "-") result = a - b;
        if(op == "*") result = a * b;
        if(op == "/") result = a / b;

        $("#result").val(result);
    });
});
</script>
</head>

<body>
<input type="text" id="num1" placeholder="Enter 1st number">
<input type="text" id="num2" placeholder="Enter 2nd number"><br><br>

<input type="button" class="btn" value="+">
<input type="button" class="btn" value="-">
<input type="button" class="btn" value="*">
<input type="button" class="btn" value="/"><br><br>

Result: <input type="text" id="result" placeholder="Result">
</body>
</html>
