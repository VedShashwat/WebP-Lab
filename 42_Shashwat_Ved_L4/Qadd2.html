<!DOCTYPE html>
<html>
<head>
<title>Sliding Text on Image</title>
<script src="jquery-4.0.0.min.js"></script>

<style>
.container {
    width: 300px;
    position: relative;
    margin: 50px auto;
}
.container img {
    width: 100%;
}
.text {
    position: absolute;
    bottom: -50px;
    background: rgba(0,0,0,0.6);
    color: white;
    width: 100%;
    text-align: center;
    padding: 10px;
}
</style>

<script>
$(document).ready(function(){
    $(".container").hover(
        function(){
            $(".text").animate({bottom: "0px"}, "slow");
        },
        function(){
            $(".text").animate({bottom: "-50px"}, "slow");
        }
    );
});
</script>
</head>

<body>
<div class="container">
    <img src="cat.jpeg" alt="Sample Image">
    <div class="text">My cat</div>
</div>
</body>
</html>
