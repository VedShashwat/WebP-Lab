<!DOCTYPE html>
<html>
<head>
<title>jQuery Calculator</title>
<script src="jquery-4.0.0.min.js"></script>

<style>
body {
    font-family: Arial;
    background-color: #f2f2f2;
}

.calculator {
    width: 260px;
    margin: 80px auto;
    padding: 20px;
    background-color: white;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
    text-align: center;
}

input[type="text"] {
    width: 90%;
    padding: 8px;
    margin: 8px 0;
    text-align: right;
    font-size: 16px;
}

button {
    width: 50px;
    height: 40px;
    margin: 5px;
    font-size: 16px;
    cursor: pointer;
    border: none;
    background-color: #4CAF50;
    color: white;
    border-radius: 5px;
}

button:hover {
    background-color: #45a049;
}

.result {
    background-color: #eee;
}
</style>

<script>
$(document).ready(function(){
    $("button").click(function(){
        var n1 = parseFloat($("#num1").val());
        var n2 = parseFloat($("#num2").val());
        var op = $(this).text();
        var res;

        if(op == "+") res = n1 + n2;
        if(op == "-") res = n1 - n2;
        if(op == "*") res = n1 * n2;
        if(op == "/") res = n1 / n2;

        $("#result").val(res);
    });
});
</script>
</head>

<body>
<div class="calculator">
    <h3>Calculator</h3>

    <input type="text" id="num1" placeholder="Enter first number">
    <input type="text" id="num2" placeholder="Enter second number">

    <div>
        <button>+</button>
        <button>-</button>
        <button>*</button>
        <button>/</button>
    </div>

    <input type="text" id="result" class="result" placeholder="Result" readonly>
</div>
</body>
</html>
