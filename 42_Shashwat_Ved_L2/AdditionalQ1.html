<!DOCTYPE html>
<html>
<head>
    <title>Train Ticket Booking</title>
    <style>
        body {
            background-color: lightblue;
            font-family: Arial;
        }
    </style>
</head>

<body>

<img src="images.jpeg" alt="Train Image" width="300">

<h2>Train Ticket Booking Form</h2>

<form>
    Passenger Name:<br>
    <input type="text"><br><br>

    From:<br>
    <input type="text"><br><br>

    To:<br>
    <input type="text"><br><br>

    Date of Journey:<br>
    <input type="date"><br><br>

    Class:<br>
    <select>
        <option>Sleeper</option>
        <option>AC</option>
    </select><br><br>

    <input type="submit" value="Submit">
</form>

</body>
</html>
