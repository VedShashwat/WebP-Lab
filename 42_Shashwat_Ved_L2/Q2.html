<!DOCTYPE html>
<html>
<head>
<title>Employee CRUD</title>
<style>
    body {
        font-family: Arial;
        background-color: white;
    }
    .container {
        width: 700px;
        margin: auto;
        background: white;
        padding: 20px;
    }
    input {
        padding: 8px;
        margin: 5px;
        width: 200px;
    }
    button {
        padding: 8px 15px;
        margin: 5px;
        background: green;
        color: white;
        border: none;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }
    th, td {
        border: 1px solid black;
        padding: 10px;
        text-align: center;
    }
    th {
        background: grey;
        color: white;
    }
</style>
</head>

<body>

<div class="container">
<h2>Employee CRUD Operations</h2>

<input type="text" placeholder="Employee ID">
<input type="text" placeholder="Employee Name">
<input type="text" placeholder="Department">

<br>

<button>Add</button>
<button>Update</button>
<button>Delete</button>
<button>View</button>

<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>Department</th>
</tr>
<tr>
<td>101</td>

</tr>
</table>

</div>

</body>
</html>
