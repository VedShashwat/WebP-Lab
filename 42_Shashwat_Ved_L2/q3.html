<!DOCTYPE html>
<html>
<head>
<title>Bootstrap Layout</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

<script
src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</head>

<body>

<div class="container-fluid">

<!-- Top Section -->
<div class="jumbotron text-center">
<h2>Dashboard <span class="label label-success">New</span></h2>
<div class="input-group">
<input type="text" class="form-control" placeholder="Search">
<span class="input-group-btn">
<button class="btn btn-primary">Go</button>
</span>
</div>
</div>

<!-- Bottom Section -->
<div class="row text-center">

<div class="col-md-4 well">
<h3>Login</h3>
<input type="text" class="form-control" placeholder="Username"><br>
<input type="password" class="form-control" placeholder="Password"><br>
<button class="btn btn-success">Login</button>
</div>

<div class="col-md-4 well">
<h3>Actions</h3>
<div class="btn-group">
<button class="btn btn-primary">Add</button>
<button class="btn btn-warning">Edit</button>
<button class="btn btn-danger">Delete</button>
</div>
</div>

<div class="col-md-4 well">
<h3>Notifications</h3>
<span class="badge">5</span> Messages<br><br>
<button class="btn btn-info">View</button>
</div>

</div>

</div>

</body>
</html>
