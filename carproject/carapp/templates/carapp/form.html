<!DOCTYPE html>
<html>
<head>
    <title>Car Manufacturer Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 60px auto;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        form {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #555;
        }
        select, input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 15px;
        }
        button {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Car Details Form</h1>
    <form method="POST">
        {% csrf_token %}

        <label for="manufacturer">Select Car Manufacturer:</label>
        <select name="manufacturer" id="manufacturer" required>
            <option value="" disabled selected>-- Select Manufacturer --</option>
            {% for brand in manufacturers %}
                <option value="{{ brand }}">{{ brand }}</option>
            {% endfor %}
        </select>

        <label for="model">Enter Car Model Name:</label>
        <input type="text" name="model" id="model" placeholder="e.g. Corolla, Civic, Mustang" required>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
