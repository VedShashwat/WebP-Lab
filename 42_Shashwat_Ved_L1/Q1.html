<!DOCTYPE html>
<html>
    <head>
        <title>
            Poem
        </title>
    </head>

    <body>
        <h1>My missing Shoe</h1>

        <p>I looked for you by the front <b>door</b>,<br>
            Under my bed, on the bathroom <b>floor</b>,<br>
            Near the back stairs, in the drawer with my <b>socks</b>,<br>
            Next to the table, and out in the <b>sandbox</b>,<br>
            My mother is calling me, and I'm calling <b>you</b>,<br>
            Where have you gone, my missing <b>shoe</b>?<br>
        </p>
    </body>
</html>
