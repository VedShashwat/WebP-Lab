<!DOCTYPE html>
<html>
<head>
<title>Interactive Greeting</title>
<style>
    body {
        /* Smooth transition for background changes */
        transition: background 2s ease;
        background: #2c3e50; 
        color: white;
        text-align: center;
        font-family: 'Segoe UI', Verdana, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
    }

    /* Simple entry animation */
    .container {
        animation: fadeIn 2s ease-in;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    h1 { font-size: 3rem; margin-bottom: 10px; }

    .clock {
        font-size: 60px;
        font-weight: bold;
        letter-spacing: 2px;
        text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    }
</style>

<script>
    function init() {
        let name = prompt("Enter your name:", "Guest") || "Guest";
        let h = new Date().getHours();
        let msg, gradient;

        // Dynamic Greeting & Background Colors
        if (h < 12) {
            msg = "Good Morning, " + name + " ☀";
            gradient = "linear-gradient(to right, #f2994a, #f2c94c)";
        } else if (h < 18) {
            msg = "Good Afternoon, " + name + " 🌤";
            gradient = "linear-gradient(to right, #2193b0, #6dd5ed)";
        } else {
            msg = "Good Evening, " + name + " 🌙";
            gradient = "linear-gradient(to right, #232526, #414345)";
        }

        document.getElementById("greeting").innerText = msg;
        document.body.style.background = gradient;
        
        showClock();
        setInterval(showClock, 1000);
    }

    function showClock() {
        document.getElementById("clock").innerHTML = new Date().toLocaleTimeString();
    }
</script>
</head>

<body onload="init()">
    <div class="container">
        <h1 id="greeting">Hello!</h1>
        <div class="clock" id="clock">00:00:00</div>
    </div>
</body>
</html>
