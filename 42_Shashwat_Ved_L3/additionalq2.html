<!DOCTYPE html>
<html>
<head>
<title>Calculator</title>
<style>
.calculator {
    width: 300px;
    margin: 60px auto;
    padding: 20px;
    background: white;
    box-shadow: 0 0 15px gray;
    border-radius: 10px;
    text-align: center;
}
input {
    width: 90%;
    padding: 8px;
    margin: 5px;
}
button {
    padding: 10px;
    margin: 5px;
    width: 60px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 5px;
}
</style>

<script>
function calc(op) {
    let a = Number(num1.value);
    let b = Number(num2.value);
    let res;

    if (op == '+') res = a + b;
    if (op == '-') res = a - b;
    if (op == '*') res = a * b;
    if (op == '/') res = a / b;

    result.innerHTML = "Result = " + res;
}
</script>
</head>

<body>
<div class="calculator">
<h2>Calculator</h2>

<input id="num1" placeholder="Number 1">
<input id="num2" placeholder="Number 2"><br>

<button onclick="calc('+')">+</button>
<button onclick="calc('-')">-</button><br>
<button onclick="calc('*')">*</button>
<button onclick="calc('/')">/</button>

<p id="result"></p>
</div>
</body>
</html>
