<!DOCTYPE html>
<html>
<head><title>Arithmetic Calculator</title></head>
<body>
    <h1>Basic Arithmetic Operations</h1>
    <form method="POST">
        {% csrf_token %}
        <input type="number" name="num1" placeholder="Enter Integer 1" required>
        <input type="number" name="num2" placeholder="Enter Integer 2" required>
        
        <select name="operation">
            <option value="add">Add</option>
            <option value="sub">Subtract</option>
            <option value="mul">Multiply</option>
            <option value="div">Divide</option>
        </select>
        
        <button type="submit">Calculate</button>
    </form>

    {% if result is not None %}
        <h3>Result: {{ result }}</h3>
    {% endif %}
</body>
</html>
