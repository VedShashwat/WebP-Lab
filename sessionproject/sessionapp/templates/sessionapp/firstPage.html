<!DOCTYPE html>
<html>
<head>
    <title>First Page - Student Details</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 60px auto;
            padding: 20px;
            background-color: #f0f4f8;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        form {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"], select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 15px;
        }
        button {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            background-color: #2c7be5;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #1a5cbf;
        }
    </style>
</head>
<body>
    <h1>Student Details - First Page</h1>
    <form method="POST">
        {% csrf_token %}

        <label for="name">Name:</label>
        <input type="text" name="name" id="name" placeholder="Enter your name" required>

        <label for="roll">Roll Number:</label>
        <input type="text" name="roll" id="roll" placeholder="Enter your roll number" required>

        <label for="subject">Subject:</label>
        <select name="subject" id="subject" required>
            <option value="" disabled selected>-- Select Subject --</option>
            {% for sub in subjects %}
                <option value="{{ sub }}">{{ sub }}</option>
            {% endfor %}
        </select>

        <button type="submit">Submit &rarr; Go to Second Page</button>
    </form>
</body>
</html>
